on: push
name: yarn build, lint, and test
jobs:
  build-and-test:
    name: build and test
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@master
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: yarn install
      - run: npm install --global gulp-cli
      - run: gulp copy-files
      - run: yarn lint
